<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Jin Kim">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="Complete your MonoMuse ticket purchase.">
    <title>Checkout | MonoMuse</title>
</head>
<body>
    <h1>Checkout</h1>
    <nav>
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Tickets</a>
        <a href="checkout.html">Checkout</a>
    </nav>

    <form>
        <p>
            <label for="customer-name">Name</label><br>
            <input type="text" id="customer-name" name="name" required>
        </p>
        <p>
            <label for="customer-email">Email</label><br>
            <input type="email" id="customer-email" name="email" required>
        </p>
        <p>
            <label for="ticket-quantity">Ticket Quantity</label><br>
            <input type="number" id="ticket-quantity" name="ticket-quantity" min="1" required>
        </p>
        <p>
            <button type="submit">Submit</button>
        </p>
    </form>

    <footer>
        <p>&copy; 2026 MonoMuse. All rights reserved.</p>
    </footer>
</body>
</html>
