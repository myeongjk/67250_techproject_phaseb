<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Your name">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="Complete your MonoMuse ticket purchase.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Checkout</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a href="checkout.html" id="navselected">Checkout</a>
        </nav>
    </header>
    <img id="logo" src="../static/logo.png" alt="MonoMuse logo">
    <div class="main">
        <form action="#" method="post">
            <p>
                <label for="name">Name</label><br>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label for="ticket-quantity">Ticket Quantity</label><br>
                <input type="number" id="ticket-quantity" name="ticket-quantity" min="1" required>
            </p>
            <p>
                <button type="submit">Submit</button>
            </p>
        </form>
    </div>
    <footer>
        <p>&copy; 2026 MonoMuse. All rights reserved.</p>
    </footer>
